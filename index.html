<script>
    function startCounter() {
        let obj = document.getElementById("memberCount");
        if (!obj) return;

        // 1. Pehle tezi se 1 lakh tak pahunchega
        let start = 99900; // 1 lakh ke thoda peeche se shuru
        let end = 100000;
        let duration = 2000;
        let startTime = null;

        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            let progress = timestamp - startTime;
            let current = Math.min(Math.floor((progress / duration) * (end - start) + start), end);
            obj.innerText = current.toLocaleString('en-US');

            if (progress < duration) {
                window.requestAnimationFrame(step);
            } else {
                // 2. 1 lakh pahunchne ke baad, dhire-dhire badhta rahega
                startLiveCounter();
            }
        }
        window.requestAnimationFrame(step);
    }

    // Yeh function 1 lakh ke baad har 3 second me 1-1 number badhayega
    function startLiveCounter() {
        let obj = document.getElementById("memberCount");
        setInterval(() => {
            let currentVal = parseInt(obj.innerText.replace(/,/g, ''));
            currentVal += 1; // Har 3 second me 1 member badhega
            obj.innerText = currentVal.toLocaleString('en-US');
        }, 3000); 
    }

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", startCounter);
    } else {
        startCounter();
    }
</script>
