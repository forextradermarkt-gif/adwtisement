    <!-- Custom CSS for Telegram Button Glow and Pop-up Effect -->
    <style>
        .telegram-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            /* Aapke button ke styles ke hisab se ise adjust kar sakte hain agar zaroorat ho */
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: all 0.3s ease;
            
            /* Neon Glow Effect */
            box-shadow: 0 0 15px rgba(0, 198, 255, 0.6);
            
            /* Pop-up (Zoom-in/out) Animation */
            animation: pulseGlow 1.8s infinite alternate ease-in-out;
        }

        /* Animation Keyframes */
        @keyframes pulseGlow {
            0% {
                transform: scale(1);
                box-shadow: 0 0 15px rgba(0, 198, 255, 0.5);
            }
            100% {
                transform: scale(1.04); /* Halka sa zoom hoga */
                box-shadow: 0 0 30px rgba(0, 198, 255, 0.9); /* Glow badhega */
            }
        }
    </style>

    <!-- Counting Animation JavaScript -->
    <script>
        function animateCounter(targetId, start, end, duration) {
            let obj = document.getElementById(targetId);
            let current = start;
            let range = end - start;
            let increment = Math.ceil(range / (duration / 12));
            
            let timer = setInterval(() => {
                current += increment;
                if (current >= end) {
                    clearInterval(timer);
                    current = end;
                }
                // Numbers ko commas ke sath show karne ke liye (e.g. 100,000)
                obj.textContent = current.toLocaleString('en-US');
            }, 12);
        }

        // Page load hote hi animation start ho jayegi (0 se lekar 100,000 tak 2 seconds me)
        window.addEventListener('DOMContentLoaded', () => {
            animateCounter("memberCount", 0, 100000, 2000);
        });
    </script>
